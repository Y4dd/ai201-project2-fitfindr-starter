[pytest]
# Make the project root importable so tests can `import tools` directly.
pythonpath = .
testpaths = tests
# Third-party deprecation from groq+pydantic v1 under Python 3.14 — not our code.
# Filtered so test/demo output stays pristine.
filterwarnings =
    ignore:Core Pydantic V1 functionality:UserWarning
    ignore:Downcasting object dtype arrays:FutureWarning
